syntax = "proto3";

option java_multiple_files = true;
option java_package = "com.leeoswald.erebus";
option java_outer_classname = "ErebusProto";
option objc_class_prefix = "Er";

package erebus;


service Erebus {
  rpc Init(InitialRequest) returns(InitialReply) {}
  rpc Authorize(AuthRequest) returns(AuthReply) {}
  rpc AddUser(AddUserRequest) returns(GenericReply) {}
  rpc RemoveUser(RemoveUserRequest) returns(GenericReply) {}
  rpc Exit(ExitRequest) returns(GenericReply) {}
  rpc Version(Void) returns(ServerVersionReply) {}
}

message Void {
}

message GenericReply {
  ResultCode code = 1;  
}

message InitialRequest {
  string user = 1;
}

message InitialReply {
  GenericReply header = 1;
  string salt = 2;  
}

message AuthRequest {
  string user = 1;
  string pwd = 2;
}

message AuthReply {
  GenericReply header = 1;
  string ticket = 3;
}

message AddUserRequest {
  string name = 1;
  string salt = 2;
  string pwd = 3;
}

message RemoveUserRequest {
  string name = 1;
}

message ServerVersionReply {
  GenericReply header = 1;
  uint32 major = 2;
  uint32 minor = 3;
  uint32 patch = 4;
}

message ExitRequest {
  bool restart = 1;
}

enum ResultCode {
  Success = 0;
  Failure = 1;
  Cancelled = 2;
  InvalidArgument = 3;
  DeadlineExceeded = 4;
  NotFound = 5;
  AlreadyExists = 6;
  PermissionDenied = 7;
  Unauthenticated = 8;
  ResourceExhausted = 9;
  FailedPrecondition = 10;
  Aborted = 11;
  OutOfRange = 12;
  Unimplemented = 13;
  Internal = 14;
  Unavailable = 15;
  DataLoss = 16;
}

