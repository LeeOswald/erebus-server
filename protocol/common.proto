syntax = "proto3";


package erebus;



message Void {
}

message GenericReply {
  optional Exception exception = 1;  
}

message Property {
  uint32 id = 1;
  oneof value {
    int32 v_int32 = 2;
    uint32 v_uint32 = 3;
    int64 v_int64 = 4;
    uint64 v_uint64 = 5;
    double v_double = 6;
    bool v_bool = 7;
    string v_string = 8;
    bytes v_bytes = 9;
    Void v_void = 10;
  }
}

message Exception {
  optional string message = 3;
  repeated Property props = 4;
}
